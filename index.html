<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  color: white;
}

/* Tiêu đề */
h1 {
  margin-top: 40px;
  font-size: 45px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px white; }
  to { text-shadow: 0 0 30px yellow; }
}

/* Ảnh tròn */
img {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 5px solid white;
  object-fit: cover;
  margin-top: 20px;
}

/* Chữ chạy */
#text {
  font-size: 22px;
  margin-top: 20px;
}

/* Bánh */
.cake {
  font-size: 80px;
  margin-top: 20px;
  cursor: pointer;
}

/* Nến */
.candle {
  font-size: 30px;
}

/* Nút */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: #ff4081;
  color: white;
  font-size: 18px;
}

/* Tim bay */
.heart {
  position: absolute;
  color: pink;
  animation: fly 2s linear forwards;
}

@keyframes fly {
  to {
    transform: translateY(-200px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday 🎂</h1>

<img src="https://lh3.googleusercontent.com/d/1dA-BL6QTt7eoxq7MA7NBv0gp1sYs7D-d">

<div id="text"></div>

<div class="cake" onclick="blowCandle()">🎂 <span class="candle">🕯️</span></div>

<button onclick="wish()">🎁 Nhấn vào đây</button>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<script>
// chữ chạy
let msg = "Chúc bạn sinh nhật vui vẻ, luôn hạnh phúc và học giỏi 💖";
let i = 0;
function type() {
  if(i < msg.length){
    document.getElementById("text").innerHTML += msg[i];
    i++;
    setTimeout(type, 50);
  }
}
type();

// thổi nến
function blowCandle(){
  document.querySelector(".candle").innerHTML = "💨";
  alert("🎂 Ước đi nào!");
}

// nút
function wish(){
  alert("🎉 Happy Birthday!!! 🎉");
}

// tim bay theo chuột
document.addEventListener("mousemove", function(e){
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = e.clientX + "px";
  heart.style.top = e.clientY + "px";
  heart.innerHTML = "💖";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),2000);
});
</script>

</body>
                                             </html>
